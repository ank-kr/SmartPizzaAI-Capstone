spring.application.name=smartpizza-api-gatewayspring.application.name=smartpizza-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.mvc.routes[0].id=auth-route
spring.cloud.gateway.mvc.routes[0].uri=lb://smartpizza-auth-service
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.mvc.routes[1].id=core-route
spring.cloud.gateway.mvc.routes[1].uri=lb://smartpizza-core-service
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/**

spring.cloud.gateway.mvc.routes[2].id=ai-route
spring.cloud.gateway.mvc.routes[2].uri=lb://smartpizza-ai-analytics-service
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/ai/**

spring.cloud.gateway.mvc.routes[3].id=analytics-route
spring.cloud.gateway.mvc.routes[3].uri=lb://smartpizza-ai-analytics-service
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/analytics/**

jwt.secret=SmartPizzaAISecretKeyForJwtTokenGenerationAtLeast256Bits12345

server.port=8080

