spring.application.name=smartpizza-api-gateway

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

jwt.secret=SmartPizzaAISecretKeyForJwtTokenGenerationAtLeast256Bits12345

spring.cloud.gateway.server.webmvc.routes[0].id=auth-route
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://smartpizza-auth-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=core-route
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://smartpizza-core-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/**

spring.cloud.gateway.server.webmvc.routes[2].id=ai-route
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://smartpizza-ai-analytics-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/ai/**

spring.cloud.gateway.server.webmvc.routes[3].id=analytics-route
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://smartpizza-ai-analytics-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/analytics/**

logging.level.com.smartpizza=INFO