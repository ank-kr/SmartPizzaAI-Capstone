spring.application.name=smartpizza-auth-service

server.port=8081

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.datasource.url=jdbc:mysql://localhost:3306/smartpizza_auth_db
spring.datasource.username=root
spring.datasource.password={DB-PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:SmartPizzaAISecretKeyForJwtTokenGenerationAtLeast256Bits12345}
jwt.expiration=3600000

logging.level.com.smartpizza=INFO